name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install npm dependencies
        run: npm ci

      # 4️⃣ Install browsers + OS deps
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Run tests (headless in CI)
      - name: Run Playwright tests
        run: npx playwright test --reporter=json,html
        continue-on-error: true

      # 6️⃣ Generate GitHub Actions Summary (BOX you wanted)
      - name: Generate Test Summary
        if: always()
        run: |
          echo "## 🎭 Playwright Test Summary" >> $GITHUB_STEP_SUMMARY
          node -e "
          const fs = require('fs');
          const path = 'test-results/results.json';

          if (!fs.existsSync(path)) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, 'No results.json found');
            process.exit(0);
          }

          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          let passed = 0, failed = 0, skipped = 0;

          function walk(suite){
            if(!suite) return;
            if(suite.specs){
              suite.specs.forEach(spec=>{
                spec.tests.forEach(t=>{
                  t.results.forEach(r=>{
                    if(r.status==='passed') passed++;
                    if(r.status==='failed') failed++;
                    if(r.status==='skipped') skipped++;
                  })
                })
              })
            }
            if(suite.suites) suite.suites.forEach(walk);
          }

          walk(data.suites[0]);
          const total = passed + failed + skipped;

          const status = failed > 0 ? '🔴 FAILURES DETECTED' : '🟢 ALL TESTS PASSED';

          const summary = `
### ${status}

| Metric | Count |
|---|---|
| Total Tests | ${total} |
| Passed | ${passed} |
| Failed | ${failed} |
| Skipped | ${skipped} |
`;

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          "

      # 7️⃣ Upload HTML report
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      # 8️⃣ Upload traces / videos / screenshots
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/