name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install npm dependencies
        run: npm ci

      # 4️⃣ Install browsers + OS deps
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Run tests (headless in CI)
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      # 6️⃣ Generate GitHub Actions Summary (BOX you wanted)
      - name: Generate Test Summary
        if: always()
        run: node scripts/generate-summary.js

      # 7️⃣ Upload HTML report
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      # 8️⃣ Upload traces / videos / screenshots
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/